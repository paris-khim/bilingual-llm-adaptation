name: LLM CI/CD Pipeline
on: [push, pull_request]
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install black ruff pytest
      - name: Lint with Ruff
        run: ruff check .
      - name: Format with Black
        run: black --check .
